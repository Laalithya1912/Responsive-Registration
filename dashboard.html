<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container d-flex justify-content-between">
    <span class="navbar-brand">Dashboard</span>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
  </div>
</nav>

<!-- Content -->
<div class="container mt-5">

  <h2 class="text-center text-white mb-4" id="welcomeText"></h2>

  <div class="row">

    <!-- Profile -->
    <div class="col-md-4 mb-3">
      <div class="card p-3 shadow dashboard-card" onclick="goTo('profile.html')">
        <h5>👤 Profile</h5>
        <p>View your details</p>
      </div>
    </div>

    <!-- Settings -->
    <div class="col-md-4 mb-3">
      <div class="card p-3 shadow dashboard-card" onclick="goTo('settings.html')">
        <h5>⚙️ Settings</h5>
        <p>Manage preferences</p>
      </div>
    </div>

    <!-- Notifications -->
    <div class="col-md-4 mb-3">
      <div class="card p-3 shadow dashboard-card" onclick="goTo('notifications.html')">
        <h5>🔔 Notifications</h5>
        <p>Check updates</p>
      </div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
