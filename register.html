<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">MyApp</span>
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow form-box">

    <h3 class="text-center">Register</h3>

    <input type="text" id="name" class="form-control mb-3" placeholder="Full Name">

    <input type="email" id="email" class="form-control mb-3" placeholder="Email">

    <div class="input-group mb-3">
      <input type="password" id="password" class="form-control" placeholder="Password">
      <button class="btn btn-outline-secondary" onclick="togglePassword('password')">👁️</button>
    </div>

    <div class="input-group mb-3">
      <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password">
      <button class="btn btn-outline-secondary" onclick="togglePassword('confirmPassword')">👁️</button>
    </div>

    <button class="btn btn-success w-100" onclick="register()">Register</button>

    <p class="text-center mt-2">
      Already have an account? <a href="login.html">Login</a>
    </p>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
