<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">MyApp</span>
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow form-box">

    <h3 class="text-center">Login</h3>

    <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email">

    <div class="input-group mb-3">
      <input type="password" id="loginPassword" class="form-control" placeholder="Password">
      <button class="btn btn-outline-secondary" onclick="togglePassword('loginPassword')">👁️</button>
    </div>

    <button class="btn btn-primary w-100" onclick="login()">Login</button>

    <p class="text-center mt-2">
      Don't have an account? <a href="register.html">Register</a>
    </p>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
